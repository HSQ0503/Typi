<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <style>
      body { font-family: -apple-system, sans-serif; width: 400px; padding: 12px; margin: 0; }
      h1 { font-size: 14px; margin: 0 0 6px; }
      h2 { font-size: 12px; margin: 12px 0 6px; color: #333; }
      p { font-size: 11px; color: #666; margin: 0 0 8px; line-height: 1.4; }
      textarea { width: 100%; height: 140px; box-sizing: border-box; font-size: 12px; padding: 6px; font-family: inherit; resize: vertical; }
      .row { display: flex; gap: 6px; margin-top: 8px; }
      .row button { margin-top: 0; }
      button { width: 100%; padding: 8px; font-size: 13px; cursor: pointer; margin-top: 8px; }
      button:disabled { opacity: 0.5; cursor: not-allowed; }
      button.stop { background: #fff0f0; border-color: #d33; color: #b00; flex: 0 0 80px; }
      #status { font-size: 11px; color: #333; margin-top: 8px; min-height: 14px; }
      #plan { max-height: 320px; overflow-y: auto; border: 1px solid #ddd; border-radius: 4px; padding: 6px; font-size: 11px; background: #fafafa; }
      .action { padding: 5px 7px; margin-bottom: 4px; border-radius: 3px; line-height: 1.4; }
      .write  { background: #e7f3ff; }
      .pause  { background: #fff4e0; color: #5a4a1f; font-style: italic; }
      .typo   { background: #ffe4e1; }
      .revise { background: #e8f5e9; }
      .label { font-weight: 600; font-size: 10px; text-transform: uppercase; letter-spacing: 0.5px; opacity: 0.7; margin-right: 6px; }
      .reason { color: #888; font-size: 10px; margin-left: 4px; display: block; margin-top: 2px; }
      .text, .wrong, .target { font-family: ui-monospace, monospace; white-space: pre-wrap; word-break: break-word; }
      .wrong  { color: #b00020; text-decoration: line-through; }
      .target { color: #6a5a2a; text-decoration: line-through; display: block; }
      .arrow  { color: #888; margin: 0 4px; }
      .replacement { font-family: ui-monospace, monospace; white-space: pre-wrap; word-break: break-word; color: #1b5e20; display: block; }
    </style>
  </head>
  <body>
    <h1>Typi</h1>
    <p>Click into the Google Doc so the cursor is blinking inside it. Then paste your text and click the button.</p>
    <textarea id="text" placeholder="Paste the text to be typed..."></textarea>
    <div class="row">
      <button id="run">Plan & type</button>
      <button id="stop" class="stop">Stop</button>
    </div>
    <div id="status"></div>
    <h2 id="planHeading" style="display:none">Plan</h2>
    <div id="plan"></div>
    <script src="popup.js"></script>
  </body>
</html>
